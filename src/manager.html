<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Tidy - 分頁管理員</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 30px; background: #f0f2l5; color: #333; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    
    /* 統計資訊列 */
    .stats-bar { display: flex; gap: 20px; margin-bottom: 25px; }
    .stat-card { 
      flex: 1; background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center;
      border: 1px solid #eee;
    }
    .stat-value { block; font-size: 24px; font-weight: bold; color: #4A90E2; }
    .stat-label { font-size: 13px; color: #666; }

    /* 網域列表 */
    .domain-tag { 
      display: inline-block; background: #e3f2fd; color: #1976d2; 
      padding: 4px 10px; border-radius: 4px; font-size: 12px; margin: 4px;
    }

    h1 { margin-top: 0; font-size: 24px; border-left: 5px solid #4A90E2; padding-left: 15px; }
    .btn-clean { 
      width: 100%; padding: 12px; background: #4A90E2; color: white; 
      border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.2s;
    }
    .btn-clean:hover { background: #357ABD; }
    
    .tab-card { 
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-bottom: 1px solid #f0f0f0;
    }
    .url { font-size: 11px; color: #999; }
    .count-badge { background: #ff4d4f; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>分頁檢視中心 (Inspect)</h1>
    
    <div class="stats-bar">
      <div class="stat-card">
        <span id="total-tabs" class="stat-value">0</span>
        <span class="stat-label">總分頁數</span>
      </div>
      <div class="stat-card">
        <span id="unique-domains" class="stat-value">0</span>
        <span class="stat-label">獨特網域數</span>
      </div>
      <div class="stat-card">
        <span id="dup-count" class="stat-value" style="color: #ff4d4f;">0</span>
        <span class="stat-label">可清理重複項</span>
      </div>
    </div>

    <div id="domain-distribution" style="margin-bottom: 20px;">
      </div>

    <button id="clean-all" class="btn-clean">一鍵清理重複項 (保留最新)</button>
    
    <div id="list" style="margin-top: 20px;"></div>
  </div>
  <script src="manager.js"></script>
</body>
</html>
